<script>
window.addEventListener('error', function(e) {
  var d = document.getElementById('root');
  if (d) d.innerHTML = '<div style="color:#ef4444;padding:40px;font-family:monospace;font-size:14px;background:#0a0e1a;min-height:100vh"><b>JS Hatası:</b><br>' + e.message + '<br><br><b>Kaynak:</b> ' + (e.filename||'') + ':' + e.lineno + '</div>';
});
window.addEventListener('unhandledrejection', function(e) {
  var d = document.getElementById('root');
  if (d && d.innerHTML === '') d.innerHTML = '<div style="color:#f59e0b;padding:40px;font-family:monospace;font-size:14px;background:#0a0e1a;min-height:100vh"><b>Promise Hatası:</b><br>' + (e.reason||'bilinmiyor') + '</div>';
});
</script>

// İ/I normalize: CSV "Istanbul" vs Tradia "İstanbul" gibi varyasyonları eşle.
function _normIl(s) {
  return (s || '').toString().toLowerCase()
    .replace(/i̇/g, 'i').replace(/ı/g, 'i').replace(/ö/g, 'o')
    .replace(/ü/g, 'u').replace(/ş/g, 's').replace(/ğ/g, 'g').replace(/ç/g, 'c');
}
function konutPiyasaFor(il, ilce) {
  const direct = KONUT_PIYASA_BY_ILCE[il + '::' + ilce];
  if (direct) return direct;
  const ni = _normIl(il), nc = _normIl(ilce);
  for (const k in KONUT_PIYASA_BY_ILCE) {
    const r = KONUT_PIYASA_BY_ILCE[k];
    if (_normIl(r.il) === ni && _normIl(r.ilce) === nc) return r;
  }
  return null;
}
function konutPiyasaIlceleriIcin(il) {
  const ni = _normIl(il);
  return Object.values(KONUT_PIYASA_BY_ILCE).filter(r => _normIl(r.il) === ni);
}
function fmtTL(n) {
  if (n == null) return '—';
  if (n >= 1e9) return (n/1e9).toFixed(1) + ' Mr ₺';
  if (n >= 1e6) return (n/1e6).toFixed(1) + ' M ₺';
  if (n >= 1e3) return (n/1e3).toFixed(0) + ' B ₺';
  return n.toLocaleString('tr') + ' ₺';
}
function fmtNum(n) {
  if (n == null) return '—';
  return Math.round(n).toLocaleString('tr');
}

}

// Map projection: lon/lat → SVG x/y  (viewBox 0 0 900 400)
const MAP_W = 900, MAP_H = 400;
const LON_MIN = 25.5, LON_MAX = 45.0, LAT_MIN = 35.8, LAT_MAX = 42.3;
function project(lon, lat) {
  const x = (lon - LON_MIN) / (LON_MAX - LON_MIN) * MAP_W;
  const y = (LAT_MAX - lat) / (LAT_MAX - LAT_MIN) * MAP_H;
  return [x, y];
}

function pathFromPoints(points) {
  return points.map((p, i) => {
    const [x, y] = project(p[0], p[1]);
    return `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
}

function useInView(ref, options = {}) {
  const [inView, setInView] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setInView(true); }, options);
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return inView;
}

function useCounter(target, duration = 2000, trigger = true) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!trigger) return;
    const start = Date.now();
    const tick = () => {
      const elapsed = Date.now() - start;
      const progress = Math.min(elapsed / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      setVal(Math.round(target * ease));
      if (progress < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [trigger, target]);
  return val;
}

        proj.rotate([-(t * 0.016), -20, 0]);
        ctx.clearRect(0, 0, w, h);

        const og = ctx.createRadialGradient(w*0.47, h*0.44, 0, w/2, h/2, scale);
        og.addColorStop(0, '#0d2545'); og.addColorStop(0.7, '#081628'); og.addColorStop(1, '#060d1a');
        ctx.beginPath(); gpath(sphere); ctx.fillStyle = og; ctx.fill();

        ctx.beginPath(); gpath(graticule);
        ctx.strokeStyle = 'rgba(20,55,115,0.42)'; ctx.lineWidth = 0.4; ctx.stroke();

        if (world) {
          world.features.forEach(f => {
            const isTr = f.id === TR_ID;
            ctx.beginPath(); gpath(f);
            ctx.globalAlpha = isTr ? 0.93 : 0.60;
            ctx.fillStyle = isTr ? '#DC2626' : '#1a3560';
            ctx.fill(); ctx.globalAlpha = 1;
            ctx.strokeStyle = isTr ? 'rgba(239,68,68,0.55)' : 'rgba(26,60,130,0.40)';
            ctx.lineWidth = isTr ? 0.9 : 0.25; ctx.stroke();
          });
        } else {
          const blobs = [
            [w/2-scale*0.28, h/2-scale*0.14, scale*0.20, scale*0.17],
            [w/2+scale*0.14, h/2-scale*0.10, scale*0.28, scale*0.22],
            [w/2-scale*0.05, h/2+scale*0.24, scale*0.14, scale*0.28],
          ];
          ctx.fillStyle = '#1a3560'; ctx.globalAlpha = 0.60;
          blobs.forEach(([bx,by,rx,ry]) => { ctx.beginPath(); ctx.ellipse(bx,by,rx,ry,0,0,Math.PI*2); ctx.fill(); });
          ctx.fillStyle = '#DC2626'; ctx.globalAlpha = 0.88;
          ctx.beginPath(); ctx.ellipse(w/2+scale*0.05, h/2-scale*0.02, scale*0.09, scale*0.045, -0.1, 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha = 1;
        }

        const ag = ctx.createRadialGradient(w/2, h/2, scale*0.95, w/2, h/2, scale*1.10);
        ag.addColorStop(0, 'rgba(59,130,246,0)'); ag.addColorStop(0.55, 'rgba(59,130,246,0.07)'); ag.addColorStop(1, 'rgba(59,130,246,0.18)');
        ctx.beginPath(); ctx.arc(w/2, h/2, scale*1.10, 0, Math.PI*2); ctx.fillStyle = ag; ctx.fill();

        const sg = ctx.createRadialGradient(w/2-scale*0.26, h/2-scale*0.32, 0, w/2, h/2, scale);
        sg.addColorStop(0, 'rgba(255,255,255,0.07)'); sg.addColorStop(0.5, 'rgba(255,255,255,0.02)'); sg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath(); gpath(sphere); ctx.fillStyle = sg; ctx.fill();

        ctx.beginPath(); gpath(sphere);
        ctx.strokeStyle = 'rgba(59,130,246,0.22)'; ctx.lineWidth = 1.5; ctx.stroke();

        if (t < 5500) {
          rafId = requestAnimationFrame(frame);
        } else {
          setPhase('zooming');
          setTimeout(() => { if (!cancelled) onComplete(); }, 1200);
        }
      };
      frame();
    };

    run();
    return () => { cancelled = true; if (rafId) cancelAnimationFrame(rafId); };
  }, []);

  return (
    <div className="relative w-full h-full flex items-center justify-center overflow-hidden"
         style={{ animation: phase === 'zooming' ? 'zoomOut 1.2s ease-in forwards' : undefined }}>
      <canvas ref={canvasRef}
              style={{ position:'absolute', inset:0, width:'100%', height:'100%', background:'#070b14', display:'block' }} />
      <div className="absolute bottom-8 left-1/2 -translate-x-1/2 text-center pointer-events-none z-10">
        <div className="font-mono text-xs text-blue-500 uppercase tracking-widest mb-2 opacity-70">
          {phase === 'loading' ? 'Yükleniyor...' : 'Dünyanın Merkezi'}
        </div>
        {phase !== 'loading' && <div className="font-grotesk font-bold text-2xl text-white" style={{textShadow:'0 0 20px rgba(59,130,246,0.4)'}}>Türkiye</div>}
      </div>
      <button onClick={onComplete}
              className="absolute top-4 right-4 font-mono text-xs text-gray-600 hover:text-gray-400 transition border border-gray-800 px-3 py-1 rounded z-10"
              style={{ background:'rgba(7,11,20,0.85)' }}>
        Atla →
      </button>
    </div>
  );
}

  useEffect(() => {
    if (!containerRef.current || typeof L === 'undefined') return;
    if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; }

    const map = L.map(containerRef.current, {
      center: [39.0, 35.5],
      zoom: compact ? 5 : 6,
      zoomControl: false,
      scrollWheelZoom: true,
      attributionControl: false,
      minZoom: 4,
      maxZoom: 14,
    });

    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 19,
    }).addTo(map);
    mapRef.current = map;

    function norm(s) {
      return (s||'').toLowerCase()
        .replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s')
        .replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c');
    }

    // Province layer
    const provinceGroup = L.layerGroup().addTo(map);
    layersRef.current.province = provinceGroup;

    const GEO_URL = 'https://cdn.jsdelivr.net/gh/cihadturhan/tr-geojson@master/geo/tr-cities-utf8.json';
    fetch(GEO_URL)
      .then(r => { if (!r.ok) throw new Error('geo-fail'); return r.json(); })
      .then(data => {
        const geoLayer = L.geoJSON(data, {
          style: feature => {
            const nm = feature.properties.name || feature.properties.NAME || '';
            const il = ILLER.find(il => norm(il.ad) === norm(nm));
            return {
              fillColor: il ? heatColor(il.isi) : '#1e3060',
              fillOpacity: 0.40,
              color: '#2a4a85',
              weight: 1,
              className: 'province-path',
            };
          },
          onEachFeature: (feature, layer) => {
            const nm = feature.properties.name || feature.properties.NAME || '';
            const il = ILLER.find(il => norm(il.ad) === norm(nm));
            if (!il) return;
            layer.on('mouseover', function() {
              this.setStyle({ fillOpacity: 0.82, weight: 2, color: '#94a3b8' });
            });
            layer.on('mouseout', function() {
              this.setStyle({ fillOpacity: 0.40, weight: 1, color: '#2a4a85' });

            layer.bindTooltip(
              '<div style="font-family:JetBrains Mono,monospace;font-size:10px;line-height:1.55">' +

              '</div>',
              { className: 'tr-tooltip', sticky: true }

            layer.on('click', () => setMapPanel({ il }));
          },
        });
        provinceGroup.addLayer(geoLayer);
        setGeoStatus('geo');

      .catch(() => {
        // Fallback: circle markers at province centroids
        ILLER.forEach(il => {
          const m = L.circleMarker([il.lat, il.lon], {
            radius: 5 + il.isi * 0.5,
            fillColor: heatColor(il.isi),

            fillOpacity: 0.78,

            '<b style="font-family:JetBrains Mono,monospace">' + il.ad + '</b>' +
            '<br><span style="font-family:JetBrains Mono,monospace;font-size:9px;color:' + heatColor(il.isi) + '">Isı: ' + il.isi + '/10</span>',

      {mapPanel && (

          <div className="px-5 py-4 border-b border-gray-800 flex items-center justify-between bg-[#0a1020]">

function SparkLine({ data }) {
  const min = Math.min(...data);
  const max = Math.max(...data);
  const h = 32, w = 80;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / (max - min || 1)) * h;
    return `${x},${y}`;
  }).join(' ');
  const area = `0,${h} ` + pts + ` ${w},${h}`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width={w} height={h}>
      <defs>
        <linearGradient id="spkGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#10b981" stopOpacity={0.4} />
          <stop offset="100%" stopColor="#10b981" stopOpacity={0} />
        </linearGradient>
      </defs>
      <polygon points={area} fill="url(#spkGrad)" />
      <polyline points={pts} fill="none" stroke="#10b981" strokeWidth={1.5} strokeLinecap="round" />
    </svg>
  );
}

/* ===== mega.jsx ===== */

/* === Mega proje helper'ları (hash route + grup/görsel lookup) === */
function megaGrupOf(mp) {
  if (mp.ana_grup) return mp.ana_grup;
  const meta = MEGA_ID_META[String(mp.id)];
  return meta ? meta.grup : 'Diğer';
}
function megaSlugOf(mp) {
  if (mp.slug) return mp.slug;
  const meta = MEGA_ID_META[String(mp.id)];
  return meta ? meta.slug : ('proje-' + mp.id);
}
function megaGorselOf(mp) {
  const slug = megaSlugOf(mp);
  return MEGA_GORSEL[slug] || null;
}

function useMegaHashRoute() {
  const [slug, setSlug] = useState(() => {
    const m = (typeof window !== 'undefined' ? window.location.hash : '').match(/^#\/mega-projeler\/([^/?]+)/);
    return m ? m[1] : null;
  });
  useEffect(() => {
    if (typeof window === 'undefined') return;
    const onHash = () => {
      const m = window.location.hash.match(/^#\/mega-projeler\/([^/?]+)/);
      setSlug(m ? m[1] : null);
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  return [slug, (newSlug) => {
    if (newSlug) window.location.hash = '#/mega-projeler/' + newSlug;
    else if (window.location.hash.startsWith('#/mega-projeler/')) window.location.hash = '#/mega-projeler';
  }];
}

function MegaProjeKart({ mp, onClick }) {
  const grup = megaGrupOf(mp);
  const gorsel = megaGorselOf(mp);
  const grupRenk = MEGA_GRUP_RENK[grup] || mp.renk || '#6B7280';
  const grupIkon = MEGA_GRUP_IKON[grup] || '◈';
  const placeholder = !!mp.placeholder;
  const durum = (mp.durum || '').toLowerCase();
  const durumLabel = mp.durum || 'belirsiz';
  return (
    <div onClick={onClick}
         className="border border-gray-800 bg-[#0d1424] rounded-xl overflow-hidden card-hover cursor-pointer group">
      {/* Kapak */}
      <div className="relative h-44 overflow-hidden" style={{ background: grupRenk + '15' }}>
        {gorsel ? (
          <img src={gorsel.thumb} alt={mp.ad || 'mega proje'} loading="lazy"
               onError={(e) => { e.currentTarget.style.display = 'none'; }}
               className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
        ) : (
          <div className="w-full h-full flex items-center justify-center"
               style={{ background: 'linear-gradient(135deg, ' + grupRenk + '33 0%, #0a0e1a 100%)' }}>
            <div className="text-center">
              <div className="text-5xl mb-2 opacity-80">{grupIkon}</div>
              <div className="font-mono text-[10px] uppercase tracking-widest" style={{ color: grupRenk }}>{grup}</div>
            </div>
          </div>
        )}
        {/* Üst rozet */}
        <div className="absolute top-2 left-2 flex gap-1.5">
          <span className="font-mono text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded backdrop-blur-sm"
                style={{ background: grupRenk + 'cc', color: '#fff' }}>{grup}</span>
          {placeholder && (
            <span className="font-mono text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-amber-500/90 text-black backdrop-blur-sm">Yeni</span>
          )}
        </div>
        {/* Sağ üst durum */}
        <div className="absolute top-2 right-2">
          <span className={'font-mono text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded backdrop-blur-sm ' + (
            durum === 'tamamlandı' ? 'bg-emerald-900/90 text-emerald-200' :
            durum === 'planlama'   ? 'bg-amber-900/90 text-amber-200' :
            durum === 'yapım'      ? 'bg-blue-900/90 text-blue-200' :

        </div>
        {/* Alt gradient overlay (görselli için okunabilirlik) */}

          <div className="absolute inset-x-0 bottom-0 h-20 pointer-events-none"
               style={{ background: 'linear-gradient(to top, rgba(13,20,36,0.95) 0%, transparent 100%)' }} />

      {/* İçerik */}
      <div className="p-5">

function MegaPage({ setPage, setSelectedIl }) {
  const [hashSlug, setHashSlug] = useMegaHashRoute();

  const [filterDurum, setFilterDurum] = useState('all');
  const [sortBy, setSortBy] = useState('isi');

  // Detay görünümü — key={hashSlug} ile yeni proje açıldığında re-mount (galeri state reset)
  if (hashSlug) {
    const mp = MEGA_PROJELER.find(p => megaSlugOf(p) === hashSlug);
    if (mp) return <MegaProjeDetay key={hashSlug} mp={mp} onBack={() => setHashSlug(null)} />;
    // Bilinmeyen slug → URL'i temizle, listeye dön
    if (typeof window !== 'undefined' && window.location.hash.startsWith('#/mega-projeler/')) {
      window.location.hash = '#/mega-projeler';
    }
  }

  const ANA_GRUPLAR = ['Ulaşım','Enerji','Su','Sağlık','Kentsel','Lojistik'];
  const filtered = MEGA_PROJELER
    .filter(m => filterGrup === 'all' || megaGrupOf(m) === filterGrup)
    .filter(m => filterDurum === 'all' || m.durum === filterDurum)
    .sort((a, b) => {
      // placeholder olanlar sonda
      if (!!a.placeholder !== !!b.placeholder) return a.placeholder ? 1 : -1;
      return sortBy === 'isi' ? (b.isi || 0) - (a.isi || 0) : a.ad.localeCompare(b.ad);
    });

  // Grup başına proje sayısı
  const grupSayilari = {};
  for (const g of ANA_GRUPLAR) grupSayilari[g] = MEGA_PROJELER.filter(m => megaGrupOf(m) === g).length;

  return (
    <div className="max-w-7xl mx-auto px-4 py-10">

        <Tag color="red">Platform</Tag>
        <h1 className="font-grotesk font-black text-4xl mt-3 mb-2">Mega Projeler</h1>
        <p className="font-body text-gray-400">

      </div>

      {/* Grup filtre bar */}
      <div className="flex flex-wrap gap-2 mb-4">
        <button onClick={() => setFilterGrup('all')}
                className={'layer-btn ' + (filterGrup === 'all' ? 'active' : '')}>
          Tümü <span className="font-mono text-[9px] opacity-60 ml-1">{MEGA_PROJELER.length}</span>
        </button>
        {ANA_GRUPLAR.map(g => (
          <button key={g} onClick={() => setFilterGrup(g)}
                  className={'layer-btn ' + (filterGrup === g ? 'active' : '')}

            <span className="mr-1">{MEGA_GRUP_IKON[g]}</span>{g}

          </button>
        ))}

      {/* Alt filtre: durum + sort */}
      <div className="flex flex-wrap gap-1 mb-8">
        {['all','aktif','yapım','tamamlandı','planlama'].map(d => (
          <button key={d} onClick={() => setFilterDurum(d)}
                  className={'layer-btn ' + (filterDurum === d ? 'active' : '')}>
            {d === 'all' ? 'Tüm Durum' : d}
          </button>
        ))}
        <button onClick={() => setSortBy(v => v === 'isi' ? 'ad' : 'isi')}
                className="layer-btn active ml-auto">
          {sortBy === 'isi' ? '↓ Skor' : 'A-Z'}
        </button>
      </div>

      {/* Stats şeridi */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        {[
          { l:'Aktif',      v: MEGA_PROJELER.filter(m=>m.durum==='aktif').length, c:'text-blue-400' },
          { l:'Yapım',      v: MEGA_PROJELER.filter(m=>m.durum==='yapım').length, c:'text-amber-400' },
          { l:'Planlama',   v: MEGA_PROJELER.filter(m=>m.durum==='planlama').length, c:'text-gray-400' },
          { l:'Tamamlandı', v: MEGA_PROJELER.filter(m=>m.durum==='tamamlandı').length, c:'text-emerald-400' },
        ].map(s => (
          <div key={s.l} className="border border-gray-800 bg-[#0d1424] rounded-lg p-4 text-center">
            <div className={'font-grotesk font-black text-3xl ' + s.c}>{s.v}</div>
            <div className="font-mono text-[10px] text-gray-500 uppercase tracking-widest mt-1">{s.l}</div>
          </div>
        ))}
      </div>

      {/* Kart grid */}
      {filtered.length === 0 ? (
        <div className="border border-gray-800 bg-[#0d1424] rounded-xl p-12 text-center">
          <p className="font-body text-gray-500">Bu filtre kombinasyonunda proje bulunmadı.</p>

      ) : (
        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-5">
          {filtered.map(mp => (
            <MegaProjeKart key={mp.id} mp={mp} onClick={() => setHashSlug(megaSlugOf(mp))} />
          ))}
        </div>
      )}
    </div>
  );
}

                    return (

                          className={'border-b border-gray-800/50 ' + (matchIlce ? 'hover:bg-gray-900/60 cursor-pointer' : '')}

                        <td className="py-2 px-2 text-gray-600">{i + 1}</td>
                        <td className="py-2 px-2">

                          {matchIlce && <span className="ml-2 text-[9px] text-amber-500">↗</span>}
                        </td>
                        <td className="py-2 px-2 text-right text-gray-300">{fmtNum(r.toplam_ilan)}</td>
                        <td className="py-2 px-2 text-right text-amber-300 font-bold">{m2v != null ? fmtNum(m2v) + ' ₺' : '—'}</td>
                        <td className="py-2 px-2 text-right text-emerald-400">{fmtTL(r.medyan_fiyat_daire_satilik)}</td>
                        <td className="py-2 px-2 text-right text-gray-400 hidden sm:table-cell">{r.ortalama_m2_buyukluk_daire != null ? fmtNum(r.ortalama_m2_buyukluk_daire) + ' m²' : '—'}</td>
                        <td className="py-2 px-2 text-right text-gray-400 hidden md:table-cell">{fmtNum(r.son_30_gun_ilan_sayisi)}</td>

              </tbody>
            </table>
          </div>
          <p className="font-mono text-[9px] text-gray-700 mt-4">
            ⓘ Aggregate veriler. ↗ işareti olan ilçeler için detay sayfası mevcut. Sıralama kriterini değiştirmek için yukarıdaki butonlara basın.
          </p>
        </div>
      )}
    </div>
  );
}

function UyelikOnKayitModal({ plan, setPage, onClose }) {
  const [email, setEmail] = useState('');
  const [ad, setAd] = useState('');
  const [kvkkChecked, setKvkkChecked] = useState(false);
  const [sent, setSent] = useState(false);
  const canSubmit = !!email && kvkkChecked;
  const submit = () => {
    if (!canSubmit) return;
    try {
      const list = JSON.parse(localStorage.getItem('tradia_uyelik_pending') || '[]');
      list.push({ plan: plan.plan, ad, email, ts: new Date().toISOString() });
      localStorage.setItem('tradia_uyelik_pending', JSON.stringify(list));
    } catch (e) {}
    setSent(true);
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()} style={{maxWidth: 480}}>
        <button onClick={onClose}
                className="float-right font-mono text-sm text-gray-500 hover:text-white">✕</button>
        {sent ? (
          <div className="text-center py-8">
            <div className="text-5xl mb-4">✓</div>
            <div className="font-grotesk font-black text-2xl text-white mb-3">Teşekkürler!</div>
            <p className="font-body text-gray-400 mb-6 leading-relaxed">
              {plan.plan} planı için ön kaydınız alındı. Üyelik akışı aktive olduğunda sizinle iletişime geçeceğiz.
            </p>
            <Btn variant="ghost" onClick={onClose}>Kapat</Btn>
          </div>
        ) : (
          <>
            <Tag color={plan.variant === 'primary' ? 'red' : plan.variant === 'gold' ? 'gold' : 'muted'}>{plan.plan} Planı</Tag>
            <h2 className="font-grotesk font-black text-2xl text-white mt-2 mb-1">Ön Kayıt</h2>
            <p className="font-body text-sm text-gray-400 mb-6">
              Tradia üyelik akışı şu an açılış öncesinde. E-postanı bırak, hazır olduğumuzda ilk sen haberdar ol.
            </p>

            <label className="block font-mono text-[10px] text-gray-500 uppercase tracking-wider mb-1">Ad (opsiyonel)</label>
            <input type="text" value={ad} onChange={e => setAd(e.target.value)}
                   placeholder="Adınız"
                   className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-red-600 mb-4 font-body" />

            <label className="block font-mono text-[10px] text-gray-500 uppercase tracking-wider mb-1">E-posta *</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)}
                   placeholder="ornek@email.com" required
                   className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-red-600 mb-3 font-body" />

            <label className="flex gap-2 text-xs text-gray-400 mb-5 cursor-pointer leading-snug">
              <input type="checkbox" checked={kvkkChecked}
                     onChange={e => setKvkkChecked(e.target.checked)}
                     className="mt-0.5 accent-red-600 flex-shrink-0" />
              <span>
                <button type="button" onClick={() => setPage('kvkk')}
                        className="text-red-400 underline hover:text-red-300">KVKK Aydınlatma Metni</button>
                'ni okudum, kişisel verilerimin işlenmesine açık rıza veriyorum.
              </span>
            </label>

            <Btn variant="primary" onClick={submit}
                 className={'w-full justify-center ' + (!canSubmit ? 'opacity-50 cursor-not-allowed' : '')}>
              Beni Bilgilendir
            </Btn>
            <p className="font-mono text-[9px] text-gray-600 mt-3 uppercase tracking-wider text-center">
              Spam yok · Tek seferlik bildirim
            </p>
          </>
        )}
      </div>
    </div>
  );
}

/* ===== cookie-banner.jsx ===== */

function CookieBanner({ setPage }) {
  const [accepted, setAccepted] = useState(() => {
    try {
      return localStorage.getItem('tradia_cookie_consent') === 'accepted';
    } catch (e) { return false; }
  });

  if (accepted) return null;

  const handleAccept = () => {
    try { localStorage.setItem('tradia_cookie_consent', 'accepted'); } catch (e) {}
    setAccepted(true);
  };

  return (
    <div className="fixed bottom-0 left-0 right-0 z-50 bg-[#0A0E1A]/95 backdrop-blur-md border-t border-white/10 p-4 md:p-6">
      <div className="max-w-6xl mx-auto flex flex-col md:flex-row md:items-center gap-4">
        <div className="flex-1 text-sm text-gray-300">
          <p>
            Bu site, deneyiminizi iyileştirmek için zorunlu çerezleri ve anonim analitik kullanır. Detay için{' '}
            <button onClick={() => setPage('cerez')} className="text-red-400 hover:underline">Çerez Politikası</button>{' '}
            ve{' '}
            <button onClick={() => setPage('gizlilik')} className="text-red-400 hover:underline">Gizlilik Politikası</button>
            'nı inceleyebilirsiniz.
          </p>
        </div>
        <div className="flex gap-2">
          <button
            onClick={handleAccept}
            className="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-md text-sm font-medium transition">
            Anladım
          </button>
        </div>
      </div>
    </div>
  );
}

/* ===== app.jsx ===== */

function App() {
  // Mount-time hash → page eşleştirme (paylaşılabilir URL'ler için).
  // Örn: /#/mega-projeler/kanal_istanbul ile gelen kullanıcı doğrudan MegaPage detay görsün.
  const initialPage = (() => {
    if (typeof window === 'undefined') return 'home';
    const h = window.location.hash || '';
    if (h.startsWith('#/mega-projeler')) return 'mega';
    return 'home';
  })();
  const [page, setPageRaw] = useState(initialPage);

  // setPage wrapper: page değişikliğinde eski mega-projeler/X hash'ini temizle.
  // (Header'dan listeye dönerken stale detay açılmasını engeller.)
  // hash atama hashchange event'i tetikler → useMegaHashRoute state'i de senkronize olur.
  const setPage = useCallback((newPage) => {
    if (typeof window !== 'undefined' && window.location.hash.startsWith('#/mega-projeler/')) {
      window.location.hash = newPage === 'mega' ? '#/mega-projeler' : '';
    }
    setPageRaw(newPage);
  }, []);

  // hashchange event: URL değişimini dinle (browser back/forward dahil)
  useEffect(() => {
    if (typeof window === 'undefined') return;
    const onHash = () => {
      const h = window.location.hash || '';
      if (h.startsWith('#/mega-projeler')) {
        setPageRaw('mega');
      }
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const [selectedIl, setSelectedIl] = useState(null);
  const [selectedIlce, setSelectedIlce] = useState(null);
  const [showGlobe, setShowGlobe] = useState(true);

  // page değişince en üste scroll
  useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [page]);

  const renderPage = () => {
    switch(page) {
      case 'home':
        return <HomePage setPage={setPage} setSelectedIl={setSelectedIl} setSelectedIlce={setSelectedIlce} showGlobe={showGlobe} setShowGlobe={setShowGlobe} />;
      case 'mega':
        return <MegaPage setPage={setPage} setSelectedIl={setSelectedIl} />;
      case 'koridor':
        return <KoridorPage setPage={setPage} />;
      case 'il':
        return <IlPage il={selectedIl} setPage={setPage} setSelectedIl={setSelectedIl} setSelectedIlce={setSelectedIlce} />;
      case 'ilce':
        return <IlcePage ilce={selectedIlce} setPage={setPage} />;
      case 'bulten':
        return <BultenPage setPage={setPage} />;
      case 'hakkimizda':
        return <HakkimizdaPage setPage={setPage} />;
      case 'uyelik':
        return <UyelikPage setPage={setPage} />;
      case 'gizlilik':
        return <GizlilikPage setPage={setPage} />;
      case 'kvkk':
        return <KvkkPage setPage={setPage} />;
      case 'sartlar':
        return <SartlarPage setPage={setPage} />;
      case 'cerez':
        return <CerezPage setPage={setPage} />;
      default:
        return <HomePage setPage={setPage} setSelectedIl={setSelectedIl} setSelectedIlce={setSelectedIlce} showGlobe={showGlobe} setShowGlobe={setShowGlobe} />;
    }
  };

  return (
    <div className="min-h-screen bg-[#0A0E1A] text-gray-100 font-body">
      <Header page={page} setPage={setPage} />
      <main style={{ animation: 'fadeIn 0.4s ease forwards' }}>
        {renderPage()}
      </main>
      <Footer setPage={setPage} />
      <CookieBanner setPage={setPage} />
    </div>
  );
}

// Recharts CDN async yüklenebilir — Recharts global hazır olana kadar render'ı geciktir.
// var binding'ler _bindRecharts() ile atanır → JSX evaluate zamanında doğru component referansları.
function _renderTradiaApp() {
  if (!_bindRecharts()) {
    return setTimeout(_renderTradiaApp, 60);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
_renderTradiaApp();
</script>
