name: Valilik Pulse Kalan (CC-Basın B94 — 51 il günlük batch)

# Tier 3: kalan 51 il (orta-küçük şehirler) — sabah batch
# Public repo → sınırsız dakika, 51 il tek run'da

on:
  schedule:
    - cron: "45 6 * * *"   # 09:45 TR
  workflow_dispatch:

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Valilik kalan tier çalıştır
        run: python3 scripts/valilik_pulse_81il.py kalan

      - name: Havuz + audit commit
        run: |
          git config user.name  "tradia-basin-bot"
          git config user.email "basin-bot@tradiaturkey.com"
          git add -f data/audit/valilik_pulse_kalan_*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Değişiklik yok, commit atlanıyor"
            exit 0
          fi
          git commit -m "valilik-kalan: $(date -u +%FT%H:%MZ) [skip ci]"
          git push
