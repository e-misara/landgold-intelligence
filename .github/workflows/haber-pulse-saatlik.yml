name: Haber Pulse Saatlik (CC-Basın anayasa v2.0)

on:
  schedule:
    # Her saat XX:10'de — TR herhangi bir TZ konvertine gerek yok, UTC ile çalışır
    # 24 run/gün × 30 = 720 run/ay × ~1 dk = 720 dk/ay (GHA $0 tier 2000 dk sınır içinde)
    - cron: "10 * * * *"
  workflow_dispatch:        # V16 SERT POC + manuel anı yakalama

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 5      # hafif RSS fetch — 5 dk yeter
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları kur
        run: pip install feedparser

      - name: Haber pulse çalıştır
        run: python3 scripts/haber_pulse_saatlik.py

      - name: Havuz + audit commit (bot)
        run: |
          git config user.name  "tradia-basin-bot"
          git config user.email "basin-bot@tradiaturkey.com"
          echo "=== B115 DEBUG ENSTRUMANTASYON ==="
          echo "[1] AUDIT DOSYA varlık:"
          ls -la data/audit/haber_pulse_*.json 2>/dev/null || echo "  YOK ← (s₃) feed fetch fail veya script audit yazmıyor"
          echo "[2] AUDIT JSON saatlik_log entry sayısı:"
          for f in data/audit/haber_pulse_*.json; do
            [ -f "$f" ] || continue
            python3 -c "import json; d=json.load(open('$f')); print(f'  $f: entries={len(d.get(\"saatlik_log\",[]))}')" 2>/dev/null || echo "  $f: parse FAIL"
          done
          echo "[3] git add audit:"
          git add -f data/audit/haber_pulse_*.json 2>/dev/null || echo "  git add fail (|| true yutuldu)"
          echo "[4] git diff staged stat:"
          git diff --cached --stat
          echo "[5] EXIT-PATH karar:"
          if git diff --cached --quiet; then
            echo "  EXIT_PATH=NO_CHANGE ← (s₃) idempotent yol, commit atlanıyor"
            exit 0
          fi
          echo "  EXIT_PATH=COMMIT_PUSH ← diff var"
          git commit -m "haber-pulse: $(date -u +%FT%H:%MZ) saatlik [skip ci]"
          echo "[6] git push:"
          git push && echo "  PUSH=SUCCESS" || echo "  PUSH=FAIL ← (s₂) read-only veya branch protection"
