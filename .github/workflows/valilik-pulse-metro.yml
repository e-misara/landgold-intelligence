name: Valilik Pulse Metro (CC-Basın B94 — 7 il yarım-günlük)

# Tier 1: yüksek-aktivite il (İstanbul/Ankara/İzmir/Bursa/Antalya/Kocaeli/Gaziantep)
# Public repo → GHA dakika sınırsız (B94 düzeltme)

on:
  schedule:
    # Sabah 06:15 UTC = 09:15 TR · akşam 14:15 UTC = 17:15 TR (yarım-günlük)
    - cron: "15 6 * * *"
    - cron: "15 14 * * *"
  workflow_dispatch:

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Valilik metro tier çalıştır
        run: python3 scripts/valilik_pulse_81il.py metro

      - name: DEBUG cloud runner state (B111)
        if: always()
        run: |
          echo "=== AUDIT DİZİNİ ==="
          ls -la data/audit/ 2>/dev/null | head -20 || echo "data/audit/ DİZİN YOK"
          echo ""
          echo "=== valilik_pulse_metro JSON varlık ==="
          ls -la data/audit/valilik_pulse_metro_*.json 2>/dev/null || echo "valilik_pulse_metro_*.json YOK"
          echo ""
          echo "=== git status (commit step öncesi) ==="
          git status --short | head -20
          echo ""
          echo "=== runner PWD ==="
          pwd

      - name: Havuz + audit commit
        run: |
          git config user.name  "tradia-basin-bot"
          git config user.email "basin-bot@tradiaturkey.com"
          git add -f data/audit/valilik_pulse_metro_*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Değişiklik yok, commit atlanıyor"
            exit 0
          fi
          git commit -m "valilik-metro: $(date -u +%FT%H:%MZ) [skip ci]"
          git push
