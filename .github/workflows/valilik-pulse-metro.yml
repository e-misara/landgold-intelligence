name: Valilik Pulse Metro (CC-Basın B94 — 7 il yarım-günlük)

# Tier 1: yüksek-aktivite il (İstanbul/Ankara/İzmir/Bursa/Antalya/Kocaeli/Gaziantep)
# Public repo → GHA dakika sınırsız (B94 düzeltme)

on:
  schedule:
    # Sabah 06:15 UTC = 09:15 TR · akşam 14:15 UTC = 17:15 TR (yarım-günlük)
    - cron: "15 6 * * *"
    - cron: "15 14 * * *"
  workflow_dispatch:

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Valilik metro tier çalıştır
        run: python3 scripts/valilik_pulse_81il.py metro

      - name: Havuz + audit commit
        run: |
          git config user.name  "tradia-basin-bot"
          git config user.email "basin-bot@tradiaturkey.com"
          echo "=== B115 DEBUG ENSTRUMANTASYON ==="
          echo "[1] AUDIT DOSYA varlık:"
          ls -la data/audit/valilik_pulse_metro_*.json 2>/dev/null || echo "  YOK"
          echo "[2] AUDIT JSON il_durum entry sayısı:"
          for f in data/audit/valilik_pulse_metro_*.json; do
            [ -f "$f" ] || continue
            python3 -c "import json; d=json.load(open('$f')); print(f'  $f: il_durum={len(d.get(\"il_durum\",[]))} relevant={d.get(\"toplam_relevant\",0)} yeni_distinct={d.get(\"toplam_yeni_distinct\",0)}')" 2>/dev/null || echo "  $f: parse FAIL"
          done
          echo "[3] git add audit:"
          git add -f data/audit/valilik_pulse_metro_*.json 2>/dev/null || echo "  git add fail"
          echo "[4] git diff staged stat:"
          git diff --cached --stat
          echo "[5] EXIT-PATH karar:"
          if git diff --cached --quiet; then
            echo "  EXIT_PATH=NO_CHANGE"
            exit 0
          fi
          echo "  EXIT_PATH=COMMIT_PUSH"
          git commit -m "valilik-metro: $(date -u +%FT%H:%MZ) [skip ci]"
          git push && echo "  PUSH=SUCCESS" || echo "  PUSH=FAIL"
