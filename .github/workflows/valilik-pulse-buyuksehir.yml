name: Valilik Pulse Büyükşehir (CC-Basın B94 — 23 il günlük)

# Tier 2: kalan büyükşehir (Adana, İzmir, Aydın, vs.)
# Metro tier'dan ayrı çalışır — günde 1 kez sabah

on:
  schedule:
    - cron: "30 6 * * *"   # 09:30 TR
  workflow_dispatch:

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Valilik büyükşehir tier çalıştır
        run: python3 scripts/valilik_pulse_81il.py buyuksehir

      - name: Havuz + audit commit
        run: |
          git config user.name  "tradia-basin-bot"
          git config user.email "basin-bot@tradiaturkey.com"
          echo "=== B115 DEBUG ENSTRUMANTASYON ==="
          echo "[1] AUDIT DOSYA varlık:"
          ls -la data/audit/valilik_pulse_buyuksehir_*.json 2>/dev/null || echo "  YOK"
          echo "[2] AUDIT metrik:"
          for f in data/audit/valilik_pulse_buyuksehir_*.json; do
            [ -f "$f" ] || continue
            python3 -c "import json; d=json.load(open('$f')); print(f'  $f: il_durum={len(d.get(\"il_durum\",[]))} relevant={d.get(\"toplam_relevant\",0)} yeni_distinct={d.get(\"toplam_yeni_distinct\",0)}')" 2>/dev/null
          done
          echo "[3] git add:"
          git add -f data/audit/valilik_pulse_buyuksehir_*.json 2>/dev/null || echo "  fail"
          echo "[4] git diff staged stat:"
          git diff --cached --stat
          echo "[5] EXIT-PATH:"
          if git diff --cached --quiet; then
            echo "  EXIT_PATH=NO_CHANGE"
            exit 0
          fi
          echo "  EXIT_PATH=COMMIT_PUSH"
          git commit -m "valilik-buyuksehir: $(date -u +%FT%H:%MZ) [skip ci]"
          git push && echo "  PUSH=SUCCESS" || echo "  PUSH=FAIL"
