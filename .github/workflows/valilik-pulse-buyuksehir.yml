name: Valilik Pulse Büyükşehir (CC-Basın B94 — 23 il günlük)

# Tier 2: kalan büyükşehir (Adana, İzmir, Aydın, vs.)
# Metro tier'dan ayrı çalışır — günde 1 kez sabah

on:
  schedule:
    - cron: "30 6 * * *"   # 09:30 TR
  workflow_dispatch:

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Valilik büyükşehir tier çalıştır
        run: python3 scripts/valilik_pulse_81il.py buyuksehir

      - name: DEBUG cloud runner state (B111)
        if: always()
        run: |
          echo "=== AUDIT DİZİNİ ==="
          ls -la data/audit/ 2>/dev/null | head -20 || echo "data/audit/ DİZİN YOK"
          echo ""
          echo "=== valilik_pulse_buyuksehir JSON varlık ==="
          ls -la data/audit/valilik_pulse_buyuksehir_*.json 2>/dev/null || echo "valilik_pulse_buyuksehir_*.json YOK"
          echo ""
          echo "=== git status (commit step öncesi) ==="
          git status --short | head -20
          echo ""
          echo "=== runner PWD ==="
          pwd

      - name: Havuz + audit commit
        run: |
          git config user.name  "tradia-basin-bot"
          git config user.email "basin-bot@tradiaturkey.com"
          git add -f data/audit/valilik_pulse_buyuksehir_*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Değişiklik yok, commit atlanıyor"
            exit 0
          fi
          git commit -m "valilik-buyuksehir: $(date -u +%FT%H:%MZ) [skip ci]"
          git push
