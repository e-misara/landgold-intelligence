name: Watchdog Hourly

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd landgold-agents
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          cd landgold-agents
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env
          echo "SITE_REPO_PATH=../LandGold" >> .env
          echo "LOG_LEVEL=INFO" >> .env
          echo "DATA_PATH=data" >> .env

      - name: Run news agent
        run: |
          cd landgold-agents
          python main.py --agent news --task full
        continue-on-error: true

      - name: Run property agent
        run: |
          cd landgold-agents
          python main.py --agent property --task score
        continue-on-error: true

      - name: Run deploy
        run: |
          cd landgold-agents
          python deploy_to_site.py
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config --global user.email "bot@tradiaturkey.com"
          git config --global user.name "Tradia Bot"
          git add -A
          git diff --staged --quiet || git commit -m "auto: agent update $(date -u +%Y-%m-%dT%H:%M)"
          git push
        continue-on-error: true
